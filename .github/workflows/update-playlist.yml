name: Update playlist

# Daily auto-refresh of the Frankly Speaking dispatches.
# Refreshes src/data/videos.json from the Frankly Speaking YouTube playlist.
# Runs daily; commits only when something changed; the push triggers Vercel's
# auto-deploy (the repo is connected to the Vercel project).

on:
  schedule:
    # Every 10 minutes — a new episode appears on the site within ~10 min of upload.
    # (Free because the repo is public; GitHub Actions minutes are unlimited for public repos.)
    - cron: '*/10 * * * *'
  workflow_dispatch: {} # allow manual "Run workflow" from the Actions tab

permissions:
  contents: write

concurrency:
  group: update-playlist
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install yt-dlp
        run: python3 -m pip install --upgrade --break-system-packages yt-dlp

      - name: Fetch playlist
        run: node scripts/fetch-playlist.mjs

      - name: Commit if the playlist changed
        run: |
          if [ -n "$(git status --porcelain src/data/videos.json)" ]; then
            git config user.name "playlist-bot"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add src/data/videos.json
            git commit -m "chore: refresh playlist (auto)"
            git push
            echo "Playlist updated and pushed."
          else
            echo "No new episodes — nothing to do."
          fi
